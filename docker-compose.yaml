services:
  web:
    build: .
    container_name: cricket-dashboard
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5000:5000"

  redis:   # 👈 MUST be this
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"