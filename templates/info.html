{% extends 'base.html' %}

{% block title %}{{ title }} - The Kinetic Analyst{% endblock %}
{% block page_header %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-3xl bg-surface-container-high rounded-xl p-8">
    <h2 class="font-headline text-4xl font-extrabold tracking-tight">{{ title }}</h2>
    <p class="text-on-surface-variant text-sm mt-2">{{ subtitle }}</p>
    <p class="text-on-surface mt-6">{{ message }}</p>
    <div class="mt-8 flex gap-3">
        <a href="{{ url_for('overview') }}" class="bg-secondary text-[#003732] px-4 py-2 rounded-xl text-sm font-semibold">Back to Dashboard</a>
        <a href="{{ url_for('support_page') }}" class="bg-surface-container-low px-4 py-2 rounded-xl text-sm">Open Support</a>
    </div>
</div>
{% endblock %}
